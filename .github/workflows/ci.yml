name: ML Model Retraining

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────
      # TAHAP 1: Checkout repositori
      # ──────────────────────────────────────────────
      - name: ⬇️ Tahap 1 - Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # TAHAP 2: Setup environment Python
      # ──────────────────────────────────────────────
      - name: 🐍 Tahap 2 - Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # ──────────────────────────────────────────────
      # TAHAP 3: Install dependencies
      # ──────────────────────────────────────────────
      - name: 📦 Tahap 3 - Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib joblib

      # ──────────────────────────────────────────────
      # TAHAP 4: Retraining model + MLflow tracking
      # Script sudah handle mlflow.set_tracking_uri("file:./mlruns")
      # dan log_param, log_metric, log_artifact untuk setiap run
      # ──────────────────────────────────────────────
      - name: 🤖 Tahap 4 - Retraining model + MLflow tracking
        run: python modelling_tuning.py

      # ──────────────────────────────────────────────
      # TAHAP 5: Upload artifacts ke GitHub
      # ──────────────────────────────────────────────
      - name: 📤 Tahap 5 - Upload artifacts model + mlruns
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_id }}
          path: |
            model/
            mlruns/
          retention-days: 30
          compression-level: 6

      # ──────────────────────────────────────────────
      # TAHAP 6: Commit model + mlruns ke repositori
      # ──────────────────────────────────────────────
      - name: 💾 Tahap 6 - Commit artifacts ke repositori
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/ mlruns/ namadataset_preprocessing/ serve.py Dockerfile.serve
          if git diff --cached --quiet; then
            echo "✅ Tidak ada perubahan — skip commit"
          else
            git commit -m "Auto-update model artifacts [skip ci]"
            git push
            echo "✅ Artifacts berhasil di-commit ke repositori"
          fi

      # ──────────────────────────────────────────────
      # TAHAP 7: Build Docker image + push ke Docker Hub
      # ──────────────────────────────────────────────
      - name: 🐳 Tahap 7a - Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: 🏗️ Tahap 7b - Build Docker image model serving
        run: docker build -f Dockerfile.serve -t workflow-ci-model .

      - name: 🏷️ Tahap 7c - Tag & Push Docker Hub
        run: |
          docker tag workflow-ci-model ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci-model:latest
          docker tag workflow-ci-model ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci-model:${{ github.run_id }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci-model:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci-model:${{ github.run_id }}
