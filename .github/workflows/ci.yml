name: ML Model Retraining

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib joblib

      - name: Run model training via MLflow
        run: mlflow run . --env-manager=local

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/ mlruns/ namadataset_preprocessing/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update model artifacts [skip ci]"
            git push
          fi
